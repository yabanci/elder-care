services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eldercare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eldercare_dev}
      POSTGRES_DB: ${POSTGRES_DB:-eldercare}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - eldercare_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eldercare}"]
      interval: 5s
      timeout: 3s
      retries: 10

  seed:
    build:
      context: ./backend
      target: seed
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-eldercare}:${POSTGRES_PASSWORD:-eldercare_dev}@db:5432/${POSTGRES_DB:-eldercare}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change_me_in_prod_please_use_long_random_string}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
      target: server
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-eldercare}:${POSTGRES_PASSWORD:-eldercare_dev}@db:5432/${POSTGRES_DB:-eldercare}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change_me_in_prod_please_use_long_random_string}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-168}
      SERVER_ADDR: ":8090"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3100}
    ports:
      - "8090:8090"
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8090}
    ports:
      - "3100:3100"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  eldercare_db:
