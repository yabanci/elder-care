services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eldercare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eldercare_dev}
      POSTGRES_DB: ${POSTGRES_DB:-eldercare}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - eldercare_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eldercare}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  eldercare_db:
